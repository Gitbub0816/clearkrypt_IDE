# XcodeGen spec for the ClearKrypt macOS IDE.
# Generate the Xcode project with:  xcodegen --spec project.yml
name: ClearKryptIDE
options:
  bundleIdPrefix: com.clearkrypt
  deploymentTarget:
    macOS: "14.0"
packages:
  ClearKryptIDECore:
    path: .
targets:
  ClearKryptIDE:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - App
    dependencies:
      - package: ClearKryptIDECore
        product: IDECore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.clearkrypt.ide
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: ClearKrypt IDE
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
